<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDFPPT</title>
  </head>
  <body>
    <main id="app">
      <section class="shell">
        <header class="topbar">
          <div>
            <h1>PDFPPT</h1>
            <p>Local PDF to editable PowerPoint converter</p>
          </div>
          <span class="status" id="status">Ready</span>
        </header>

        <section class="workspace" aria-label="Conversion workspace">
          <div class="controls">
            <div class="drop-zone" id="dropZone">
              <div>
                <strong>Drop PDF here</strong>
                <span id="dropHint">or choose a file from your computer</span>
              </div>
              <button id="pickPdf" type="button">Choose PDF</button>
            </div>

            <label class="field">
              <span>Selected PDF</span>
              <input id="pdfPath" placeholder="No PDF selected" autocomplete="off" readonly />
            </label>

            <div class="option-grid">
              <label class="field">
                <span>Java</span>
                <input id="javaCmd" value="" autocomplete="off" />
              </label>
              <label class="field">
                <span>Pages</span>
                <input id="pages" placeholder="All pages" autocomplete="off" />
              </label>
            </div>

            <div class="actions">
              <button id="inspect" type="button">Inspect</button>
              <button id="convert" class="primary" type="button">Convert</button>
              <button id="download" type="button" disabled>Download PPTX</button>
            </div>
          </div>

          <div class="report">
            <div class="metric-row">
              <div class="metric">
                <span>Slides</span>
                <strong id="slides">-</strong>
              </div>
              <div class="metric">
                <span>Text</span>
                <strong id="textShapes">-</strong>
              </div>
              <div class="metric">
                <span>Tables</span>
                <strong id="tables">-</strong>
              </div>
              <div class="metric">
                <span>Images</span>
                <strong id="pictures">-</strong>
              </div>
            </div>

            <div class="warnings" id="warnings"></div>
            <pre id="output" aria-live="polite"></pre>
          </div>
        </section>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
